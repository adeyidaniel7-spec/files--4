<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: none;
    }

    .card.connected {
      display: block;
    }

    #status {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .wallet-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .wallet-btn:hover {
      background: #f9f9f9;
      border-color: #2b5fff;
      color: #2b5fff;
    }

    .wallet-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: #e0e0e0;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="status"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.14.0/dist/ethers.umd.min.js"></script>
  <script type="module" src="checkout.js"></script>
</body>
</html>
